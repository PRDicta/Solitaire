# Project Vocabulary Aliases
# Maps canonical internal names to user-facing names and alternative references.
# Used at:
#   - Ingestion time: tag entries with aliases when canonical name detected in content
#   - Query time: expand queries containing aliases to also search canonical names
#
# Format: canonical_name -> list of aliases (user-facing names for the same thing)

