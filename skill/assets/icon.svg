<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1a1a2e"/>
  <!-- Connection lines (drawn first, behind nodes) -->
  <line x1="32" y1="20" x2="18" y2="38" stroke="#0f3460" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="20" x2="46" y2="38" stroke="#0f3460" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="38" x2="32" y2="50" stroke="#0f3460" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="38" x2="32" y2="50" stroke="#0f3460" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="38" x2="46" y2="38" stroke="#0f3460" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3,2"/>
  <!-- Primary node (top) -->
  <circle cx="32" cy="20" r="6" fill="none" stroke="#e94560" stroke-width="2.5"/>
  <circle cx="32" cy="20" r="2.5" fill="#e94560"/>
  <!-- Left node -->
  <circle cx="18" cy="38" r="4.5" fill="none" stroke="#e94560" stroke-width="2"/>
  <circle cx="18" cy="38" r="2" fill="#e94560"/>
  <!-- Right node -->
  <circle cx="46" cy="38" r="4.5" fill="none" stroke="#e94560" stroke-width="2"/>
  <circle cx="46" cy="38" r="2" fill="#e94560"/>
  <!-- Bottom node (identity) -->
  <circle cx="32" cy="50" r="5" fill="none" stroke="#e94560" stroke-width="2.5"/>
  <circle cx="32" cy="50" r="2" fill="#e94560"/>
</svg>
